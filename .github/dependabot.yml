version: 2
updates:
  # Maintain dependencies for the Nuxt project
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    # Grouping keeps your PR list clean by combining related updates
    groups:
      dependencies:
        patterns: ["*"]
        # Group everything into one monthly PR to minimize noise
        update-types: ["minor", "patch"]
    open-pull-requests-limit: 5

  # Maintain GitHub Actions versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      actions:
        patterns: ["*"]
